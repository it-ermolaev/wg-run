services:
  wg:
    container_name: wg
    image: alpine:3.23.3
    ports:
      - '51820:51820/udp'
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ./wireguard:/etc/wireguard
      - ./scripts/init-wg.sh:/init.sh:ro
    command: >
      sh -c "
        apk add --no-cache wireguard-tools iptables &&
        sh /init.sh
      "
    restart: unless-stopped
  wg-client:
    container_name: wg-client
    image: alpine:3.23.3
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ./wireguard:/etc/wireguard
      - ./scripts/init-wg-client.sh:/init.sh:ro
    command: >
      sh -c "
        apk add --no-cache wireguard-tools &&
        sh /init.sh
      "
    restart: unless-stopped
