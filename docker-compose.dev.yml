services:
  wg:
    container_name: wg
    image: alpine:3.23.3
    ports:
      - '51820:51820/udp'
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ./wg-data:/etc/wireguard
    command: >
      sh -c "
        apk add --no-cache wireguard-tools iptables &&
        mkdir -p /etc/wireguard &&
        tail -f /dev/null
      "
    restart: unless-stopped
  wg-client:
    container_name: wg-client
    image: alpine:3.23.3
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ./wg-data:/etc/wireguard
    command: >
      sh -c "
        apk add --no-cache wireguard-tools &&
        tail -f /dev/null
      "
    restart: unless-stopped
